name: 📅 Daily AI Core Tech Briefing

on:
  # 每天北京时间 8:00 自动运行 (= UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      # ── 1. 拉取代码 ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. 安装 Python ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 安装依赖 ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 配置环境变量 ─────────────────────────────────────────────
      - name: Set environment variables
        run: |
          echo "DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=${{ github.repository }}" >> $GITHUB_ENV
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      # ── 5. 运行简报生成 ─────────────────────────────────────────────
      - name: Generate daily briefing
        run: python main.py

      # ── 6. 提交简报文件到 GitHub ─────────────────────────────────────
      - name: Commit and push briefing to GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          DATE_TODAY=$(date +%Y-%m-%d)
          FILE_PATTERN="daily/*${DATE_TODAY}*.md"

          if ls $FILE_PATTERN 1> /dev/null 2>&1; then
            git add $FILE_PATTERN
            git add INDEX.md 2>/dev/null || true
            git commit -m "📅 Daily Briefing: ${DATE_TODAY} [CI skip]" || echo "No changes to commit"
            git push origin ${{ github.ref_name }}
          else
            echo "No new briefing files to commit"
          fi

      # ── 7. 发送邮件 ─────────────────────────────────────────────────
      - name: Send briefing via email
        if: |
            vars.SMTP_USERNAME != '' && vars.SMTP_PASSWORD != ''
        uses: appleboy/smtp-action@v0.1.7
        with:
          host: ${{ vars.SMTP_HOST || 'smtp.qq.com' }}
          port: ${{ vars.SMTP_PORT || 465 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ vars.EMAIL_FROM_NAME || 'AI 核心技术简报' }} <${{ secrets.SMTP_USERNAME }}>
          subject: "🤖 AI 核心技术简报 $(date +%Y-%m-%d)"
          body: |
            请在 GitHub 查看完整简报：
            https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/daily/
          insecure: false
          debug: false
        env:
          SMTPS_HOST: ${{ vars.SMTP_HOST || 'smtp.qq.com' }}
          SMTPS_PORT: ${{ vars.SMTP_PORT || '465' }}

      # ── 8. 上传当日简报为 artifact ────────────────────────────────────
      - name: Upload briefing artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing-${{ github.run_number }}
          path: daily/AI核心技术简报_*.md
          retention-days: 30
